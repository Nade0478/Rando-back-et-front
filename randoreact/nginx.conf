server {
    listen 80;
    server_name rando-ouest.com www.rando-ouest.com;

    root /usr/share/nginx/html;
    index index.html;

    # Redirection vers HTTPS (si Traefik ne gère pas déjà ça)
    # return 301 https://$host$request_uri;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fichiers statiques avec cache agressif
    location ~* \.(?:ico|css|js|woff2?|ttf|eot|svg|jpg|jpeg|png|gif|webp|avif|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sécurité des headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Compression Gzip (si non gérée ailleurs)
    gzip on;
    gzip_types text/plain application/javascript text/css application/json;

    # Logs personnalisés
    error_log /var/log/nginx/vuejs_error.log;
    access_log /var/log/nginx/vuejs_access.log;
}
