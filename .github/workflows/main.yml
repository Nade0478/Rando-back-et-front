name: RANDO-FRONT-BACK-app

on:
  push:
    branches:
      - "NOUVELLE-BRANCHE-MAIN"

env:
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: laravel

jobs:
  tests:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v1

      - name: Install Docker
        uses: hoverkraft-tech/compose-action@v2.0.1

      - name: Start Docker Compose
        run: docker-compose up -d

      - name: Sleep for 10 seconds
        run: sleep 10s
        shell: bash

      - name: Run Laravel migrations
        run: docker exec laravel-api-docker php artisan migrate

      - name: Run Laravel seeders
        run: docker exec laravel-api-docker php artisan db:seed

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: Install dependencies (React)
        run: npm install
        working-directory: Projet-rando-front

      - name: Install Jest globally
        run: npm install -g jest

      - name: Run React tests
        run: npm run test
        working-directory: Projet-rando-front

  build-and-push-image-api-prod:
    needs: [tests]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: Nade0478
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Laravel image
        uses: docker/build-push-action@v6
        with:
          context: ./rando-ouest-laravel-NOUVELLE-BRANCHE-MAIN
          build-args: |
            MODE=prod
          push: true
          tags: |
            ghcr.io/nade0478/cda-api-prod:latest
            ghcr.io/nade0478/cda-api-prod:${{ github.sha }}

  build-and-push-image-spa-prod:
    needs: [tests]
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: Nade0478
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push React image
        uses: docker/build-push-action@v6
        with:
          context: ./Projet-rando-front
          build-args: |
            MODE=prod
          push: true
          tags: |
            ghcr.io/nade0478/cda-spa-prod:latest
            ghcr.io/nade0478/cda-spa-prod:${{ github.sha }}

  deploy-to-hostinger:
    needs:
      - build-and-push-image-api-prod
      - build-and-push-image-spa-prod
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            docker pull ghcr.io/nade0478/cda-api-prod:latest
            docker pull ghcr.io/nade0478/cda-spa-prod:latest
            docker stop api || true && docker rm api || true
            docker stop spa || true && docker rm spa || true
            docker run -d --name api -p 8000:8000 ghcr.io/nade0478/cda-api-prod:latest
            docker run -d --name spa -p 3000:3000 ghcr.io/nade0478/cda-spa-prod:latest
