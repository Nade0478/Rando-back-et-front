name: CI/CD Pipeline

on:
  push:
    branches: [ NOUVELLE-BRANCHE-MAIN, develop ]
  pull_request:
    branches: [ NOUVELLE-BRANCHE-MAIN ]

jobs:
  test-laravel:
    runs-on: ubuntu-latest
    name: Setup Laravel API
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: rando_ouest_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, fileinfo, mysql, gd
        coverage: xdebug

    - name: Copy Laravel Environment
      run: |
        cd randolaravel
        cp .env.example .env.testing
        echo "DB_CONNECTION=mysql" >> .env.testing
        echo "DB_HOST=127.0.0.1" >> .env.testing
        echo "DB_PORT=3306" >> .env.testing
        echo "DB_DATABASE=rando_ouest_test" >> .env.testing
        echo "DB_USERNAME=rando_user" >> .env.testing
        echo "DB_PASSWORD=Root72" >> .env.testing
        echo "CACHE_DRIVER=array" >> .env
        echo "SESSION_DRIVER=array" >> .env
        echo "QUEUE_CONNECTION=sync" >> .env

    - name: Install Laravel Dependencies
      run: |
        cd randolaravel
        composer install --no-progress --prefer-dist --optimize-autoloader --no-dev

    - name: Generate Laravel Key
      run: |
        cd randolaravel
        php artisan key:generate

    - name: Wait for MySQL to be ready
      run: |
        cd randolaravel
        timeout 60s bash -c 'until mysqladmin ping -h 127.0.0.1 -u root -ppassword --silent; do sleep 1; done'

    - name: Run Laravel Migrations
      run: |
        cd randolaravel
        php artisan migrate --force --no-interaction

    - name: Test Laravel Setup
      run: |
        cd randolaravel
        php artisan route:list
        echo "✅ Laravel API setup completed successfully"
  test-react:
    runs-on: ubuntu-latest
    name: Test React App with Jest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'randoreact/package-lock.json'

    - name: Install React Dependencies
      run: |
        cd randoreact
        npm ci

    - name: Run Jest Tests
      run: |
        cd randoreact
        npm run test -- --coverage --watchAll=false --verbose

    - name: Upload Jest Coverage Reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        file: ./randoreact/coverage/lcov.info
        flags: jest
        name: jest-coverage
        fail_ci_if_error: false

    - name: Build React App
      run: |
        cd randoreact
        npm run build

    - name: Test Build Size
      run: |
        cd randoreact
        ls -la build/
        echo "✅ React build completed successfully"

  deploy:
    needs: [test-laravel, test-react]
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Registry (optional)
      if: env.DOCKER_REGISTRY_URL != ''
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.DOCKER_REGISTRY_URL }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Images
      run: |
        echo "Building Laravel API..."
        docker build -t rando-laravel:latest -f randolaravel/Dockerfile randolaravel/
        echo "Building React App..."
        docker build -t rando-react:latest -f randoreact/Dockerfile randoreact/

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        key: ${{ secrets.HOSTINGER_SSH_KEY }}
        port: 22
        script: |
          cd /var/www/rando-ouest.com
          
          echo "🔄 Stopping existing containers..."
          docker-compose down
          
          echo "📥 Updating code from GitHub..."
          git pull origin main
          
          echo "🏗️ Building Docker images..."
          docker-compose build --no-cache
          
          echo "🚀 Starting services..."
          docker-compose up -d
          
          echo "⏳ Waiting for services to start..."
          sleep 30
          
          echo "🗃️ Running Laravel migrations..."
          docker-compose exec -T laravel php artisan migrate --force
          
          echo "⚡ Optimizing Laravel..."
          docker-compose exec -T laravel php artisan config:cache
          docker-compose exec -T laravel php artisan route:cache
          docker-compose exec -T laravel php artisan view:cache
          docker-compose exec -T laravel php artisan storage:link
          
          echo "🧹 Cleaning up Docker..."
          docker system prune -af
          
          echo "✅ Deployment completed successfully!"
          echo "🌐 Site: https://rando-ouest.com"
          echo "🔧 API: https://api.rando-ouest.com"