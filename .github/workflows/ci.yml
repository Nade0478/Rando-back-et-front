name: CI

on:
  push:
    branches:
      - NOUVELLE-BRANCHE-MAIN
  pull_request:
    branches:
      - NOUVELLE-BRANCHE-MAIN

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code
      uses: actions/checkout@v3

    - name: Configuration de PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Installation des dépendances Laravel
      run: |
        composer install --no-interaction --prefer-dist
        cp .env.example .env
        php artisan key:generate

    - name: Lancer les tests
      run: php artisan test

    - name: Build de l’image Docker
      run: docker build -t ton-utilisateur/ton-image:latest .

    - name: Push vers Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        docker push ton-utilisateur/ton-image:latest