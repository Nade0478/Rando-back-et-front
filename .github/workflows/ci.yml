name: CI/CD Pipeline

on:
  push:
    branches: [ NOUVELLE-BRANCHE-MAIN, develop ]
  pull_request:
    branches: [ NOUVELLE-BRANCHE-MAIN ]

jobs:
  test-laravel:
    runs-on: ubuntu-latest
    name: Test Laravel API
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: rando_ouest_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, fileinfo, mysql, gd
        coverage: xdebug

    - name: Copy Laravel Environment
      run: |
        cd randolaravel
        cp .env.example .env.testing
        echo "DB_CONNECTION=mysql" >> .env.testing
        echo "DB_HOST=127.0.0.1" >> .env.testing
        echo "DB_PORT=3306" >> .env.testing
        echo "DB_DATABASE=rando_ouest_test" >> .env.testing
        echo "DB_USERNAME=rando_user" >> .env.testing
        echo "DB_PASSWORD=Root72" >> .env.testing

    - name: Install Laravel Dependencies
      run: |
        cd randolaravel
        composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Generate Laravel Key
      run: |
        cd randolaravel
        php artisan key:generate --env=testing

    - name: Run Laravel Migrations
      run: |
        cd randolaravel
        php artisan migrate --env=testing --force

    - name: Run Laravel Tests
      run: |
        cd randolaravel
        php artisan test

  test-react:
    runs-on: ubuntu-latest
    name: Test React App

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'randoreact/package-lock.json'

    - name: Install React Dependencies
      run: |
        cd randoreact
        npm ci

    - name: Run Jest Tests
      run: |
        cd randoreact
        npm run test -- --coverage --watchAll=false

    - name: Build React App
      run: |
        cd randoreact
        npm run build

  deploy:
    needs: [test-laravel, test-react]
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Registry (optional)
      if: env.DOCKER_REGISTRY_URL != ''
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.DOCKER_REGISTRY_URL }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Images
      run: |
        docker build -t rando-laravel:latest -f randolaravel/Dockerfile randolaravel/
        docker build -t rando-react:latest -f randoreact/Dockerfile randoreact/

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOSTINGER_HOST }}
        username: ${{ secrets.HOSTINGER_USER }}
        key: ${{ secrets.HOSTINGER_SSH_KEY }}
        port: 22
        script: |
          cd /var/www/rando-ouest.com
          
          # Arrêter les conteneurs existants
          docker-compose down
          
          # Mettre à jour le code
          git pull origin main
          
          # Rebuild et redémarrer
          docker-compose build --no-cache
          docker-compose up -d
          
          # Attendre que les services démarrent
          sleep 30
          
          # Migrations Laravel
          docker-compose exec -T laravel php artisan migrate --force
          
          # Cache Laravel
          docker-compose exec -T laravel php artisan config:cache
          docker-compose exec -T laravel php artisan route:cache
          docker-compose exec -T laravel php artisan view:cache
          
          # Nettoyer les images non utilisées
          docker system prune -af