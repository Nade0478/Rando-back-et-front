name: CI

on:
  push:
    branches:
      - NOUVELLE-BRANCHE-MAIN
  pull_request:
    branches:
      - NOUVELLE-BRANCHE-MAIN

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rando_ouest
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout du code
      uses: actions/checkout@v3

    - name: Configuration de PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, pdo_mysql, zip
        coverage: none

    - name: Installation des dépendances Laravel
      run: |
        cp .env.example .env
        php artisan key:generate
        composer install --no-interaction --prefer-dist

    - name: Attendre que MySQL soit prêt
      run: sleep 15

    - name: Lancer les tests Laravel
      run: php artisan test

    - name: Build de l’image Docker
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/rando-laravel:latest .

    - name: Push vers Docker Hub
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        docker push ${{ secrets.DOCKER_USERNAME }}/rando-laravel:latest
