version: '3.8'

services:
  laravel-docker:
    container_name: laravel-docker
    build:
      context: ./randolaravel
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.laravel.rule=Host(`api.tondomaine.com`)"
      - "traefik.http.services.laravel.loadbalancer.server.port=80"
    ports:
      - "8000:80"
    volumes:
      - ./randolaravel:/var/www/app
    depends_on:
      - mysql_db

  mysql_db:
    container_name: mysql_db
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel-api-rando
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:latest
    ports:
      - "9001:80"
    environment:
      PMA_HOST: mysql_db
      PMA_PORT: 3306
    depends_on:
      - mysql_db

  traefik:
    container_name: traefik
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  watchtower:
    container_name: watchtower
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300

volumes:
  dbdata:
