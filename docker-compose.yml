version: '3.8'

services:
  laravel-api:
    build: ./rando-ouest-laravel-NOUVELLE-BRANCHE-MAIN
    container_name: laravel-api
    ports:
      - "8000:8000" # Laravel écoute sur le port 8000
    volumes:
      - ./rando-ouest-laravel-NOUVELLE-BRANCHE-MAIN:/var/www/html
      - storage:/var/www/html/storage/app/public
    depends_on:
      - mysql
    networks:
      - app-net
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: rando_ouest
      DB_USERNAME: root
      DB_PASSWORD: root

  react-app:
    build: ./Projet-rando-front
    container_name: react-app
    ports:
      - "3000:3000"
    networks:
      - app-net
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-net
    restart: unless-stopped

volumes:
  storage:
  mysql_data:

networks:
  app-net:
    driver: bridge
