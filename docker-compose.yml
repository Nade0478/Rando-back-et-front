services:
  laravel-api-docker:
    container_name: laravel-api-docker
    build: ./randolaravel
    ports:
      - 8000:80

    volumes:
      - ~/storage:/var/www/app/storage 

  react-docker:
    container_name: react-docker
    build: ./randoreact
    ports:
      - 80:80

  mysql_db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: OPL2025
      MYSQL_DATABASE: rando_ouest
    ports:
      - 3306:3306

    volumes: 
      - mysql_data:/var/lib/mysql