services:
  laravel-docker:
    container_name: randolaravel
    build: ./randolaravel
    ports:
      - 8000:80
    volumes:
      - ./randolaravel:/var/www/html
    depends_on:
      - mysql_db

  mysql_db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rando_ouest
    ports:
      - 3306:3306

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - 9001:80
    environment:
      PMA_HOST: mysql_db
