version: '3.8'

services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=support@rando-ouest.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "443:443"
      # Optionnel : expose le dashboard Traefik en local uniquement (ou protège-le)
      - "8080:8080"
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  laravel-docker:
    image: ghcr.io/nade0478/cda-api-prod:latest
    container_name: laravel-docker
    depends_on:
      - mysql_db
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.laravel.rule=Host(`api.rando-ouest.com`)"
      - "traefik.http.routers.laravel.entrypoints=websecure"
      - "traefik.http.routers.laravel.tls=true"
      - "traefik.http.routers.laravel.tls.certresolver=myresolver"
    volumes:
      - storage:/var/www/app/storage/app/public
    restart: unless-stopped

  vue-docker:
    image: ghcr.io/nade0478/cda-spa-prod:latest
    container_name: vue-docker
    depends_on:
      - laravel-docker
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`rando-ouest.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
    restart: unless-stopped

  mysql_db:
    image: mysql:latest
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: rando_ouest
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  storage:
  mysql_data:
  letsencrypt:
