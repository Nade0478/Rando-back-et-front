version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: rando-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rando_ouest
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - rando-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  react:
    build:
      context: ./randoreact
      dockerfile: Dockerfile.dev
    container_name: rando-react
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL}
    volumes:
      - ./randoreact:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - rando-network

  laravel:
    build: 
      context: ./randolaravel
      dockerfile: Dockerfile
    container_name: rando-laravel
    restart: unless-stopped
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${LARAVEL_APP_KEY}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=rando_ouest
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - ./randolaravel:/var/www/html
      - ./randolaravel/storage:/var/www/html/storage
      - ./randolaravel/bootstrap/cache:/var/www/html/bootstrap/cache
    ports:
      - "9000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - rando-network
    command: ["sh", "-c", "sleep 15 && php artisan config:clear && php artisan cache:clear && php artisan serve --host=0.0.0.0 --port=8000"]

volumes:
  mysql_data:

networks:
  rando-network:
    driver: bridge