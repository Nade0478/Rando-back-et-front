version: '3.8'

services:
  # Base de données MySQL
  mysql:
    image: mysql:8.0
    container_name: rando-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rando_ouest
      MYSQL_USER: root
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - rando-network
    # Ajout du healthcheck
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PhpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: rando-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
      UPLOAD_LIMIT: 256M
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - rando-network

  # API Laravel
  laravel:
    # MODIFICATION IMPORTANTE : Utilise l'image buildée par CI/CD
    image: ${DOCKER_REGISTRY_PREFIX}rando-laravel:latest
    container_name: rando-laravel
    restart: unless-stopped
    environment:
      - APP_NAME="Rando Ouest"
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${LARAVEL_APP_KEY}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=rando_ouest
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      # MODIFICATION : Volumes plus spécifiques pour la production
      - laravel_storage:/var/www/html/storage
      - laravel_logs:/var/www/html/storage/logs
    ports:
      - "9000:9000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - rando-network
    # Ajout du healthcheck
    healthcheck:
      test: ["CMD", "php", "artisan", "tinker", "--execute=echo 'OK';"]
      timeout: 10s
      retries: 5
      start_period: 30s

  # Application React
  react:
    # MODIFICATION IMPORTANTE : Utilise l'image buildée par CI/CD
    image: ${DOCKER_REGISTRY_PREFIX}rando-react:latest
    container_name: rando-react
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL}
    ports:
      - "3000:3000"
    networks:
      - rando-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: rando-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/sites:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
      # MODIFICATION : Récupère les fichiers depuis le container React
      - react_build:/var/www/react
    depends_on:
      - laravel
      - react
    networks:
      - rando-network

  # Redis pour le cache Laravel
  redis:
    image: redis:7-alpine
    container_name: rando-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --replica-read-only no
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rando-network
    # Ajout du healthcheck
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  # AJOUT : Nouveaux volumes pour Laravel
  laravel_storage:
  laravel_logs:
  react_build:

networks:
  rando-network:
    driver: bridge